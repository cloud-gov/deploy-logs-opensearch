- type: replace
  path: /instance_groups/name=opensearch_manager/jobs/name=opensearch/properties/opensearch/repository?
  value: &repository-s3-config
    s3:
      bucket: ((snapshot_bucket))
      region: ((region))
      name: repository-test
      enabled: true
      secret_name: ((snapshot_key))
      path: logs/snapshot

- type: replace
  path: /instance_groups/name=opensearch_data/jobs/name=opensearch/properties/opensearch/repository?
  value: *repository-s3-config

